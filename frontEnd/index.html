<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>LyricFinder</title>
  <style>
    html {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #__loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: opacity 0.35s ease;
    }

    #__ltrack {
      width: 70%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 9999px;
      overflow: hidden;
      position: relative;
    }

    #__logo {
      width: 50px;
      margin-right: 40px;
    }

    #__title {
      color: black;
      font-size: 50px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-items: center;
      margin-bottom: 3%;
      letter-spacing: 2px;
      font-weight: bold;
    }

    #__status {
      color: black;
      margin-top: 20px;
      font-size: 20px;
    }

    @media (prefers-color-scheme: dark) {
      #__loader {
        background: #131313;
      }

      #__ltrack {
        background: #363434;
      }

      #__title {
        color: white;
      }

      #__status {
        color: white;
      }
    }

    #__loader.done {
      opacity: 0;
      pointer-events: none;
    }

    #__lfill {
      height: 100%;
      width: 0%;
      background: #6366f1;
      border-radius: 9999px;
      transition: width 0.15s ease-out;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>

  <div id="__loader">
    <div id="__title">
      <img id="__logo" src="/favicon.ico" />
      <div>Lyric Finder</div>
    </div>
    <div id="__ltrack">
      <div id="__lfill"></div>
    </div>
    <div id="__status">
      <span id="__status_text">Loading</span> <span id="__status_dot"></span>
    </div>
  </div>
  <div id="app"></div>

  <script>
    (function () {
      const fill = document.getElementById('__lfill');
      const __steps = [{
        pct: 0,
        label: "Loading Page"
      },{
        pct: 20,
        label: "Loading Framework"
      },{
        pct: 50,
        label: "Registering Plugins"
      },{
        pct: 80,
        label: "Mounting App"
      },{
        pct: 99,
        label: "Almost Done"
      }]
      let _pct = 0;

      class WindowLoader {
        constructor(){
          this._steps = [...__steps].sort((a, b) => a.pct - b.pct)
          this._current_step = 0;
          this._done = false;
          this._status_text_el = document.getElementById("__status_text");
          this._status_dot_el = document.getElementById("__status_dot")
          this._current_dot = 0;
          this._dot_interval = setInterval(()=>{
            if(this._status_dot_el) {
              this._status_dot_el.innerText = ".".repeat(this._current_dot+1);
              this._current_dot = (this._current_dot + 1) % 3;
            }
          },500)
          this._fail_safe = setTimeout(() => {
            if (!this._done) this.done();
          }, 10000)
        }
        set(pct) {
          _pct = Math.max(_pct, Math.min(pct, 99));
          while (this._current_step < this._steps.length - 1
              && _pct >= this._steps[this._current_step + 1].pct) {
            this._current_step++;
          }
          if (this._status_text_el)
            this._status_text_el.innerText = this._steps[this._current_step].label;
          fill.style.width = _pct + '%';
        }
        done() {
          if (this._done) return;
          this._done = true;
          clearInterval(this._dot_interval);
          clearTimeout(this._fail_safe);
          fill.style.width = '100%';
          const el = document.getElementById('__loader');
          setTimeout(() => {
            el.classList.add('done');
            el.addEventListener('transitionend', () => el.remove(), { once: true });
          }, 350);
        }
      }

      window.__loader = new WindowLoader();
    })();
  </script>
</body>

</html>
